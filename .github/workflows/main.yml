name: Build Lex Reader APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter & Dart versions
        run: |
          flutter --version
          dart --version

      - name: Complete project structure
        run: |
          cp lib/main.dart                                                        /tmp/main.dart.bak
          cp android/app/build.gradle                                             /tmp/app_build.gradle.bak
          cp android/app/src/main/AndroidManifest.xml                            /tmp/AndroidManifest.xml.bak
          cp android/app/src/main/kotlin/com/lexreader/MainActivity.kt           /tmp/MainActivity.kt.bak

          flutter create . --project-name lexreader --org com.lexreader --platforms android

          cp /tmp/main.dart.bak           lib/main.dart
          cp /tmp/app_build.gradle.bak    android/app/build.gradle
          cp /tmp/AndroidManifest.xml.bak android/app/src/main/AndroidManifest.xml
          mkdir -p android/app/src/main/kotlin/com/lexreader/lexreader
          cp /tmp/MainActivity.kt.bak     android/app/src/main/kotlin/com/lexreader/lexreader/MainActivity.kt

          echo "sdk.dir=$ANDROID_HOME"     >  android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze --no-fatal-infos || true

      - name: Build APK split per ABI
        run: flutter build apk --release --split-per-abi

      - name: Build APK universal
        run: flutter build apk --release

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: lexreader-apks-${{ github.sha }}
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
          retention-days: 30
          if-no-files-found: warn

  release:
    name: GitHub Release
    needs: build-apk
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Complete project structure
        run: |
          cp lib/main.dart                                                        /tmp/main.dart.bak
          cp android/app/build.gradle                                             /tmp/app_build.gradle.bak
          cp android/app/src/main/AndroidManifest.xml                            /tmp/AndroidManifest.xml.bak
          cp android/app/src/main/kotlin/com/lexreader/MainActivity.kt           /tmp/MainActivity.kt.bak

          flutter create . --project-name lexreader --org com.lexreader --platforms android

          cp /tmp/main.dart.bak           lib/main.dart
          cp /tmp/app_build.gradle.bak    android/app/build.gradle
          cp /tmp/AndroidManifest.xml.bak android/app/src/main/AndroidManifest.xml
          mkdir -p android/app/src/main/kotlin/com/lexreader/lexreader
          cp /tmp/MainActivity.kt.bak     android/app/src/main/kotlin/com/lexreader/lexreader/MainActivity.kt

          echo "sdk.dir=$ANDROID_HOME"     >  android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties

      - name: Flutter pub get
        run: flutter pub get

      - name: Build universal APK
        run: flutter build apk --release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          name: Lex Reader ${{ github.ref_name }}
          body: |
            ## Lex Reader ${{ github.ref_name }}

            APK de instalación directa. Activá "Orígenes desconocidos" en Android antes de instalar.

            **Formatos soportados:** PDF · EPUB · DOCX · PPTX · XLSX · Markdown
