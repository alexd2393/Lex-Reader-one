name: lexreader
description: Lector personal de documentos — PDF, EPUB, DOCX, PPTX, XLSX, Markdown.
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # PDF
  syncfusion_flutter_pdfviewer: ^32.2.4

  # EPUB
  epub_view: ^3.2.0

  # Markdown
  flutter_markdown: ^0.7.3

  # Excel (.xlsx) — lectura pura en Dart, sin platform channel
  excel: ^4.0.6

  # HTML rendering (para DOCX convertido por Apache POI)
  flutter_html: ^3.0.0-beta.2

  # File picker
  file_picker: ^8.0.0+1

  # Compartir archivos
  share_plus: ^9.0.0

  # Directorio temporal para conversiones
  path_provider: ^2.1.3

  # Estado global
  provider: ^6.1.2

  # Íconos de formato
  flutter_svg: ^2.0.10+1

  # Formato de tamaño de archivo
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
